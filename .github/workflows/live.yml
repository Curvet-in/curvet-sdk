name: Live Contract Test

on:
  schedule:
    - cron: "0 6 * * *" # nightly canary
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          CURVET_TEST_APP_KEY: ${{ secrets.CURVET_TEST_APP_KEY }}
