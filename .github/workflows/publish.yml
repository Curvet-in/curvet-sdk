name: Publish to npm

# Publishes via npm Trusted Publishing (OIDC) — NO npm token required.
# One-time setup on npmjs.com: package @curvet/sdk -> Settings -> Trusted Publisher
#   Publisher: GitHub Actions
#   Organization/user: Curvet-in
#   Repository:        curvet-sdk
#   Workflow filename: publish.yml
# After that, every GitHub Release publishes automatically (with provenance).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted Publishing (OIDC) requires npm >= 11.5.1; the runner ships npm 10.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Skip if this version is already on npm
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@curvet/sdk@$VERSION" version >/dev/null 2>&1; then
            echo "@curvet/sdk@$VERSION is already published — skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      # prepublishOnly runs typecheck + tests + build. No NODE_AUTH_TOKEN —
      # auth + provenance come from the OIDC trusted-publisher trust.
      - name: Publish
        if: steps.check.outputs.exists == 'false'
        run: npm publish
